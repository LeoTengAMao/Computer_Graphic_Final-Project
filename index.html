<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>WebGL FNAF Project</title>

    <link rel="stylesheet" href="style.css">

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: white; font-family: sans-serif; }
        #webgl-canvas { width: 100vw; height: 100vh; display: block; }
        
        /*  遊戲的 2D UI 疊層 (預設隱藏) */
        #ui-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; 
            display: none; 
        }
        
        /* 互動按鈕 */
        .btn { pointer-events: auto; position: absolute; padding: 15px 30px; font-size: 20px; cursor: pointer; background: rgba(255,255,255,0.2); color: white; border: 2px solid white; border-radius: 10px;}
        .btn:hover { background: rgba(255,255,255,0.5); }

        #btn-door-left { bottom: 20%; left: 5%; }
        #btn-light-left { bottom: 10%; left: 5%; }
        #btn-door-right { bottom: 15%; left: 36%; }
        #btn-light-right { bottom: 15%; left: 51%; }
        #btn-monitor { bottom: 5%; left: 50%; transform: translateX(-50%); width: 300px;}

        /* 開始畫面的設計 */
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000; 
            z-index: 100; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .title {
            font-size: 60px; color: #fff; letter-spacing: 8px; text-shadow: 2px 2px 5px red; margin: 0;
        }
        .subtitle {
            font-size: 20px; color: #aaa; letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <canvas id="webgl-canvas"></canvas>

    <div id="start-screen">
        <h1 class="title">FIVE NIGHTS AT WEBGL</h1>
        <p class="subtitle">Survive from 12 AM to 6 AM...</p>
        <p id="loading-text" style="color: gray; margin-top: 20px;">載入模型與音效中，請稍候...</p>

        <div id="main-menu" style="display: none; margin-top: 40px; flex-direction: column; gap: 15px; align-items: center;">
            <div style="display: flex; gap: 10px;">
                <button class="btn menu-btn" data-night="1" style="position:relative;">Night 1</button>
                <button class="btn menu-btn" data-night="2" style="position:relative;">Night 2</button>
                <button class="btn menu-btn" data-night="3" style="position:relative;">Night 3</button>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn menu-btn" data-night="4" style="position:relative;">Night 4</button>
                <button class="btn menu-btn" data-night="5" style="position:relative;">Night 5</button>
            </div>
            <button id="btn-open-custom" class="btn" style="position:relative; margin-top: 20px; border-color: red; color: red;">Custom Night (7/20)</button>
        </div>

        <div id="custom-night-panel" style="display: none; margin-top: 30px; text-align: center; background: rgba(20,0,0,0.8); padding: 20px; border: 2px solid red; border-radius: 15px;">
            <h2 style="color: red; margin-top: 0;">CUSTOM NIGHT</h2>
            <div style="display: flex; gap: 30px; justify-content: center; margin-bottom: 30px;">
                <div class="ai-control">
                    <div style="font-size: 20px; color: #8B4513; font-weight: bold;">Freddy</div>
                    <button class="btn ai-adj" data-animatronic="freddy" data-dir="-1" style="position:relative; padding: 5px 15px;">-</button>
                    <span id="ai-val-freddy" style="font-size:30px; margin: 0 10px;">20</span>
                    <button class="btn ai-adj" data-animatronic="freddy" data-dir="1" style="position:relative; padding: 5px 15px;">+</button>
                </div>
                <div class="ai-control">
                    <div style="font-size: 20px; color: #8A2BE2; font-weight: bold;">Bonnie</div>
                    <button class="btn ai-adj" data-animatronic="bonnie" data-dir="-1" style="position:relative; padding: 5px 15px;">-</button>
                    <span id="ai-val-bonnie" style="font-size:30px; margin: 0 10px;">20</span>
                    <button class="btn ai-adj" data-animatronic="bonnie" data-dir="1" style="position:relative; padding: 5px 15px;">+</button>
                </div>
                <div class="ai-control">
                    <div style="font-size: 20px; color: #FFD700; font-weight: bold;">Chica</div>
                    <button class="btn ai-adj" data-animatronic="chica" data-dir="-1" style="position:relative; padding: 5px 15px;">-</button>
                    <span id="ai-val-chica" style="font-size:30px; margin: 0 10px;">20</span>
                    <button class="btn ai-adj" data-animatronic="chica" data-dir="1" style="position:relative; padding: 5px 15px;">+</button>
                </div>
                <div class="ai-control">
                    <div style="font-size: 20px; color: #DC143C; font-weight: bold;">Foxy</div>
                    <button class="btn ai-adj" data-animatronic="foxy" data-dir="-1" style="position:relative; padding: 5px 15px;">-</button>
                    <span id="ai-val-foxy" style="font-size:30px; margin: 0 10px;">20</span>
                    <button class="btn ai-adj" data-animatronic="foxy" data-dir="1" style="position:relative; padding: 5px 15px;">+</button>
                </div>
            </div>
            <button id="btn-start-custom" class="btn" style="position:relative; border-color: red; color: red; font-size: 24px; padding: 10px 40px;">READY</button>
            <button id="btn-back-menu" class="btn" style="position:relative; font-size: 20px; margin-left: 20px;">BACK</button>
        </div>

        <div style="position: absolute; bottom: 10px; left: 10px; color: rgba(255, 255, 255, 0.4); font-family: 'Courier New', Courier, monospace; font-size: 16px; pointer-events: none;">
            ver.1.1.0
        </div>
    </div>

    <div id="ui-layer">
        <button id="btn-mute-call" class="btn" style="top: 20px; left: 50%; transform: translateX(-50%); display: none; border-color: yellow; color: yellow; z-index: 100;">MUTE CALL</button>
        <button id="btn-door-left" class="btn">Toggle Left Door</button>
        <button id="btn-light-left" class="btn">Toggle Left Light</button>
        <button id="btn-door-right" class="btn">Toggle Front Door</button>
        <button id="btn-light-right" class="btn">Toggle Front Light</button>
        <button id="btn-monitor" class="btn">Open Monitor</button>

        <div id="power-display" style="position: absolute; top: 20px; left: 20px; font-size: 30px; font-weight: bold; color: #0f0;">
            Power: 100%
        </div>

        <div id="time-display" style="position: absolute; top: 20px; right: 20px; color: white; font-family: 'Courier New', Courier, monospace; font-size: 32px; font-weight: bold; text-shadow: 2px 2px 5px black; pointer-events: none; display: none;">
            12 AM
        </div>

        <div id="camera-panel" style="display: none; position: absolute; right: 20px; bottom: 50px; width: 220px; background: rgba(0,0,0,0.7); padding: 10px; border: 2px solid white; border-radius: 10px; pointer-events: auto;">
            <h3 style="margin: 0 0 8px 0; text-align: center; font-size: 16px;">Camera System</h3>
            
            <button class="btn cam-btn" data-cam="cam1" style="position:relative; display:block; margin: 5px 0; padding: 6px; width: 100%; font-size: 14px; box-sizing: border-box;">CAM 1 (主舞台)</button>
            <button class="btn cam-btn" data-cam="cam2" style="position:relative; display:block; margin: 5px 0; padding: 6px; width: 100%; font-size: 14px; box-sizing: border-box;">CAM 2 (用餐區)</button>
            <button class="btn cam-btn" data-cam="cam3" style="position:relative; display:block; margin: 5px 0; padding: 6px; width: 100%; font-size: 14px; box-sizing: border-box;">CAM 3 (海盜灣)</button>
            <button class="btn cam-btn" data-cam="cam4" style="position:relative; display:block; margin: 5px 0; padding: 6px; width: 100%; font-size: 14px; box-sizing: border-box;">CAM 4 (右通風管)</button>
            <button class="btn cam-btn" data-cam="cam5" style="position:relative; display:block; margin: 5px 0; padding: 6px; width: 100%; font-size: 14px; box-sizing: border-box;">CAM 5 (DJ台)</button>
            <button class="btn cam-btn" data-cam="cam6" style="position:relative; display:block; margin: 5px 0; padding: 6px; width: 100%; font-size: 14px; box-sizing: border-box;">CAM 6 (左邊走廊)</button>
            <button class="btn cam-btn" data-cam="cam7" style="position:relative; display:block; margin: 5px 0; padding: 6px; width: 100%; font-size: 14px; box-sizing: border-box;">CAM 7 (打掃間)</button>
            <button class="btn cam-btn" data-cam="cam8" style="position:relative; display:block; margin: 5px 0; padding: 6px; width: 100%; font-size: 14px; box-sizing: border-box;">CAM 8 (通風管道)</button>
        </div>

        <div id="crt-effect" style="display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: repeating-linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1) 2px, transparent 2px, transparent 4px); pointer-events: none;"></div>
    </div>

    <script src="cuon-matrix.js"></script>      
    <script src="WebGL.js"></script>
    <script src="game.js"></script>
</body>
</html>
